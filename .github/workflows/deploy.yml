name: Deploy to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'sorloz/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Trigger Hostinger Git Auto-deploy

    steps:
      - name: Ping Hostinger deploy webhook
        run: |
          curl -s -X POST "${{ secrets.HOSTINGER_DEPLOY_URL }}" \
            -H "Content-Type: application/json" \
            --fail \
            --retry 3 \
            --retry-delay 5
          echo "Deploy triggered successfully"
