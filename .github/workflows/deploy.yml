name: Sync deploy branch for Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'sorloz/**'
  workflow_dispatch:

jobs:
  sync-deploy:
    runs-on: ubuntu-latest
    name: Sync sorloz/ → deploy branch

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push sorloz/ content to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout deploy
          git rm -rf . --quiet || true
          git checkout main -- sorloz/
          cp -r sorloz/. .
          rm -rf sorloz

          git add -A
          git diff --cached --quiet || git commit -m "Deploy: sync from main [skip ci]"
          git push origin deploy
